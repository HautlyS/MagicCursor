name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUSTUP_TOOLCHAIN: stable
  CARGO_TERM_COLOR: always
  FORCE_JUST_JAVASCRIPT: true

jobs:
  # Build browser extensions
  build-extensions:
    name: Build Browser Extensions (${{ matrix.browser }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            os: ubuntu-latest
            artifact: extension/chrome.zip
          - browser: firefox
            os: ubuntu-latest
            artifact: extension/firefox.xpi
          - browser: opera
            os: ubuntu-latest
            artifact: extension/opera.crx
          - browser: safari
            os: macos-latest
            artifact: extension/safari.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build ${{ matrix.browser }} extension
        run: |
          echo "Building for ${{ matrix.browser }}"
          if [ "${{ matrix.browser }}" = "safari" ]; then
            npm run build:safari 2>&1
          else
            npm run build:${{ matrix.browser }} 2>&1
          fi
          echo "Build exit code: $?"
        env:
          NODE_ENV: production
          TARGET_BROWSER: ${{ matrix.browser }}

      - name: Upload Safari artifact
        if: matrix.browser == 'safari'
        run: |
          mkdir -p extension/safari-extension
          if [ -d "extension/safari" ]; then
            cp -r extension/safari/* extension/safari-extension/
          fi
          cd extension
          zip -r safari-extension.zip safari-extension
          cd ..
          echo "Safari build artifacts:"
          ls -la extension/safari-extension/

      - name: Upload Safari package
        if: matrix.browser == 'safari'
        uses: actions/upload-artifact@v4
        with:
          name: extension-safari
          path: extension/safari-extension.zip

      - name: Upload artifact
        if: matrix.browser != 'safari'
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: ${{ matrix.artifact }}

  # Build Tauri desktop app
  build-tauri:
    name: Build Desktop App (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos, windows, linux]
        include:
          - platform: macos
            runner: macos-latest
          - platform: windows
            runner: windows-latest
          - platform: linux
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Vue frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build Vue desktop preview
  build-vue-preview:
    name: Build Vue Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-preview
          path: dist
          retention-days: 7

  # Create release
  release:
    needs: [build-extensions, build-tauri, build-vue-preview]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: extension-*
          merge-multiple: true

      - name: Download Safari artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-safari
          path: artifacts/safari

      - name: Download Tauri artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/tauri
          pattern: tauri-*
          merge-multiple: true

      - name: Download Vue preview
        uses: actions/download-artifact@v4
        with:
          name: vue-preview
          path: artifacts/vue

      - name: Prepare release
        run: |
          mkdir -p release
          shopt -s nullglob
          for f in artifacts/extension-*.zip artifacts/extension-*.xpi artifacts/extension-*.crx; do
            [ -f "$f" ] && cp "$f" release/
          done
          find artifacts/tauri -type f \( -name "*.exe" -o -name "*.app" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.deb" \) -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Run tests and verification
  test:
    name: Test & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build

      - name: Verify Vue build output
        run: |
          echo "Checking Vue build..."
          test -f dist/index.html && echo "✓ index.html exists"
          test -d dist/assets && echo "✓ assets directory exists"
          ls -la dist/

      - name: Build browser extensions
        run: |
          npm run build:chrome
          npm run build:firefox
          npm run build:opera
          npm run build:safari

      - name: Verify extension builds
        run: |
          echo "Checking extension builds..."
          for ext in chrome firefox opera; do
            if [ -d "extension/$ext" ]; then
              echo "✓ $ext extension built"
            fi
          done